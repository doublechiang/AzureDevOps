steps:
  # 1. Build Docker Image
  # 指定 -f 指向子目錄的 Dockerfile，最後的路徑也指向該子目錄
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'gcr.io/$PROJECT_ID/validate-close:$COMMIT_SHA', 
      '-f', 'ValidateClose/Dockerfile', 
      'ValidateClose'
    ]

  # 2. Push Image to Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/validate-close:$COMMIT_SHA']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'validate-close'
      - '--image'
      - 'gcr.io/$PROJECT_ID/validate-close:$COMMIT_SHA'
      - '--region'
      - 'asia-east1'
      - '--platform'
      - 'managed'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/$PROJECT_ID/validate-close:$COMMIT_SHA'